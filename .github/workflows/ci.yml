name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webview-ui/package-lock.json

      - name: Install dependencies (root)
        run: npm ci

      - name: Install dependencies (webview-ui)
        run: npm ci --prefix webview-ui

      - name: Typecheck (host)
        run: npm run typecheck

      - name: Typecheck (webview)
        run: npm --prefix webview-ui run typecheck

      - name: Test (host + webview)
        run: npm test

      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npx vsce package --no-dependencies -o sqowe-wingman.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqowe-wingman-vsix
          path: sqowe-wingman.vsix
          if-no-files-found: error

