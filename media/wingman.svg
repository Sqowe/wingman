<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!--
    Sqowe Wingman activity-bar icon: the sqowe brandmark "o" — a bold ring
    with a solid dot set high and slightly right inside it (a simplified
    aperture/eye). Uses currentColor so VS Code tints it to the active /
    inactive activity-bar colour; fill-rule="evenodd" carves the ring's hole.
  -->
  <path fill-rule="evenodd" d="
    M 2.6,12 a 9.4,9.4 0 1,0 18.8,0 a 9.4,9.4 0 1,0 -18.8,0 Z
    M 4.9,12 a 7.1,7.1 0 1,0 14.2,0 a 7.1,7.1 0 1,0 -14.2,0 Z
    M 11.3,8.4 a 1.7,1.7 0 1,0 3.4,0 a 1.7,1.7 0 1,0 -3.4,0 Z
  "/>
</svg>
